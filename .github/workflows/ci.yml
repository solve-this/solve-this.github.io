# CI — Quality Gate
#
# Runs on every pull request targeting `main` and blocks the merge until all
# four jobs pass:
#
#   1. type-check        — TypeScript strict compile (vue-tsc --noEmit)
#   2. audit             — npm audit (high/critical CVEs block the PR)
#                          npm outdated is reported informally, never blocks
#   3. build             — full Vite production build.
#                          Uses el-j/google-sheet-translations@v1.4.0 action to fetch
#                          translations before running npm run build.
#   4. translations-sync — uses the same bundled action to fetch the latest translations
#                          and verifies the committed JSON files match exactly.
#                          Fails with fix instructions if any drift is found.
#
# ── Branch protection ──────────────────────────────────────────────────────────
# For these jobs to actually gate merges, enable branch protection on `main`:
#   Repository → Settings → Branches → Branch protection rules
#   ✅ Require status checks to pass before merging
#   ✅ Require branches to be up to date before merging
#   Required checks: TypeScript / Package Audit / Build / Translations Sync
#
# ── Environment secrets ────────────────────────────────────────────────────────
# The `build` and `translations-sync` jobs use the `production` GitHub
# environment (same as the deploy workflow).  Make sure that environment is
# configured to allow access from PR branches, not just `main`.
# Secrets needed:  GOOGLE_CLIENT_EMAIL · GOOGLE_PRIVATE_KEY · GOOGLE_SPREADSHEET_ID

name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel previous runs for the same branch when new commits are pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. TypeScript ─────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Strict type-check (vue-tsc --noEmit)
        run: npm run type-check

  # ── 2. Package Audit ──────────────────────────────────────────────────────────
  audit:
    name: Package Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit for known vulnerabilities (high and above, including critical)
        run: npm audit --audit-level=high

      # Informational: lists packages with newer versions available.
      # Never fails the build; output is visible in the workflow logs.
      - name: Report outdated packages (informational)
        run: npm outdated || true
        continue-on-error: true

  # ── 3. Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fetch translations using the bundled GitHub Action (no extra Node setup needed).
      # The action writes locale JSON files to src/i18n/translations/ before the build.
      - name: Fetch translations from Google Sheets
        uses: el-j/google-sheet-translations@v1.4.0
        with:
          google-client-email:      ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          google-private-key:       ${{ secrets.GOOGLE_PRIVATE_KEY }}
          google-spreadsheet-id:    ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          sheet-titles:             'landingPage'
          translations-output-dir:  'src/i18n/translations'
          locales-output-path:      'src/i18n/locales.ts'
          data-json-path:           'src/i18n/languageData.json'
          sync-local-changes:       'false'
          row-limit:                '200'
          wait-seconds:             '1'

      # Build Vite app. SKIP_PREBUILD_FETCH=1 tells the prebuild hook to skip the
      # redundant fetch since the action above already populated the translation files.
      - name: Production build
        run: npm run build
        env:
          VITE_BASE_PATH: /
          SKIP_PREBUILD_FETCH: '1'

  # ── 4. Translations Sync ──────────────────────────────────────────────────────
  translations-sync:
    name: Translations Sync
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # Use the bundled GitHub Action — no Node.js setup or npm install needed.
      # The action reads the spreadsheet and writes locale JSON files.
      - name: Fetch latest translations from Google Sheets
        uses: el-j/google-sheet-translations@v1.4.0
        with:
          google-client-email:      ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          google-private-key:       ${{ secrets.GOOGLE_PRIVATE_KEY }}
          google-spreadsheet-id:    ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          sheet-titles:             'landingPage'
          translations-output-dir:  'src/i18n/translations'
          locales-output-path:      'src/i18n/locales.ts'
          data-json-path:           'src/i18n/languageData.json'
          sync-local-changes:       'false'
          row-limit:                '200'
          wait-seconds:             '1'

      # If the action updated any JSON file in translations/, the committed source
      # is out of sync with the spreadsheet → block the PR.
      - name: Verify committed translations match the spreadsheet
        run: |
          if ! git diff --exit-code src/i18n/translations/; then
            echo ""
            echo "❌ Translation files are out of sync with Google Sheets."
            echo ""
            echo "To fix, run one of the following locally and commit the result:"
            echo "  • npm run fetch-translations   – spreadsheet has newer translations"
            echo "  • npm run sync-translations    – you added new keys to en.json"
            exit 1
          fi
          echo "✅ All committed translation files match the Google Spreadsheet."
